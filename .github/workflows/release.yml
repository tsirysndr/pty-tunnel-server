name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Clone vercel/sandbox
        uses: actions/checkout@v4
        with:
          repository: vercel/sandbox
          path: sandbox

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build pty-tunnel-server
        working-directory: sandbox/packages/pty-tunnel-server
        run: |
          GOOS=linux GOARCH=amd64 go build -o pty-tunnel-server .

      - name: Create tarball
        working-directory: sandbox/packages/pty-tunnel-server
        run: |
          tar -czvf pty-server-linux-x86_64.tar.gz pty-tunnel-server

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sandbox/packages/pty-tunnel-server/pty-server-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
